name: Update CSV from Google Sheets

on:
  schedule:
    - cron: '0 0 * * *'  # Setiap hari jam 07.00 WIB (00.00 UTC)
  workflow_dispatch:       # Bisa trigger manual

jobs:
  update-csv:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install gspread google-auth pandas

      - name: Run update script
        env:
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
        run: python scripts/update_csv.py

      - name: Commit and push CSV
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add data/*.csv
          git diff --staged --quiet || git commit -m "Auto-update LC data $(date +'%Y-%m-%d')"
          git push
